<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spray Paint Stencil Maker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e9ecef;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 0.85em;
            font-weight: bold;
            color: #555;
        }
        button, select, input[type="file"], input[type="range"] {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            padding: 12px 20px;
            margin-top: auto;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        .layer-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .layer {
            text-align: center;
            background: #fff;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            flex: 1 1 300px;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid #ccc;
            margin-bottom: 10px;
            background: #eee;
        }
        #status {
            font-style: italic;
            color: #666;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Spray Paint Stencil Maker</h2>
    <p>Upload an image and adjust the smoothness to generate clean, cuttable stencil layers.</p>

    <div class="controls">
        <div class="control-group">
            <label for="imageInput">1. Choose Image</label>
            <input type="file" id="imageInput" accept="image/png, image/jpeg, image/webp">
        </div>
        
        <div class="control-group">
            <label for="layerCount">2. Stencil Layers</label>
            <select id="layerCount">
                <option value="2">1 Stencil Layer (2 Colors)</option>
                <option value="3">2 Stencil Layers (3 Colors)</option>
                <option value="4">3 Stencil Layers (4 Colors)</option>
                <option value="5" selected>4 Stencil Layers (5 Colors)</option>
            </select>
        </div>

        <div class="control-group">
            <label for="smoothness">3. Smoothness (Reduces tiny dots)</label>
            <input type="range" id="smoothness" min="0" max="10" value="3">
        </div>

        <button id="processBtn" disabled>Generate Stencils</button>
    </div>

    <div id="status">Waiting for image...</div>
    <div class="layer-container" id="output"></div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const processBtn = document.getElementById('processBtn');
    const layerCountSelect = document.getElementById('layerCount');
    const smoothnessSlider = document.getElementById('smoothness');
    const statusText = document.getElementById('status');
    const outputDiv = document.getElementById('output');
    
    let sourceImage = new Image();

    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            sourceImage.src = event.target.result;
            sourceImage.onload = () => {
                processBtn.disabled = false;
                statusText.innerText = "Image loaded. Adjust settings and click Generate.";
            };
        };
        reader.readAsDataURL(file);
    });

    processBtn.addEventListener('click', function() {
        statusText.innerText = "Processing... (This might take a few seconds)";
        outputDiv.innerHTML = "";
        setTimeout(() => generateStencils(), 50); 
    });

    function generateStencils() {
        const k = parseInt(layerCountSelect.value);
        const blurAmount = smoothnessSlider.value;
        
        const maxDim = 800; 
        let width = sourceImage.width;
        let height = sourceImage.height;
        
        if (width > maxDim || height > maxDim) {
            const ratio = Math.min(maxDim / width, maxDim / height);
            width = Math.floor(width * ratio);
            height = Math.floor(height * ratio);
        }

        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');

        // Apply visual smoothing before processing to merge tiny, un-cuttable islands
        ctx.filter = `blur(${blurAmount}px) contrast(1.5)`;
        ctx.drawImage(sourceImage, 0, 0, width, height);
        ctx.filter = 'none'; // reset filter

        const imgData = ctx.getImageData(0, 0, width, height);
        const data = imgData.data;
        let grayValues = new Float32Array(width * height);
        
        for (let i = 0; i < data.length; i += 4) {
            let gray = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
            grayValues[i/4] = gray;
        }

        const { centroids, assignments } = kMeans(grayValues, k);

        let sortedCentroids = centroids.map((val, index) => ({val, index}))
                                       .sort((a, b) => a.val - b.val);

        sortedCentroids.forEach((centroidObj, layerIndex) => {
            const layerCanvas = document.createElement('canvas');
            layerCanvas.width = width;
            layerCanvas.height = height;
            const layerCtx = layerCanvas.getContext('2d');
            const layerImgData = layerCtx.createImageData(width, height);
            const lData = layerImgData.data;

            for (let i = 0; i < grayValues.length; i++) {
                const pixelIndex = i * 4;
                if (assignments[i] === centroidObj.index) {
                    lData[pixelIndex] = 0;     
                    lData[pixelIndex+1] = 0;   
                    lData[pixelIndex+2] = 0;   
                    lData[pixelIndex+3] = 255; 
                } else {
                    lData[pixelIndex] = 255;
                    lData[pixelIndex+1] = 255;
                    lData[pixelIndex+2] = 255;
                    lData[pixelIndex+3] = 255;
                }
            }

            layerCtx.putImageData(layerImgData, 0, 0);

            const layerDiv = document.createElement('div');
            layerDiv.className = 'layer';
            
            let layerName = `Layer ${layerIndex + 1}`;
            if (layerIndex === 0) layerName += " (Darkest Paint)";
            else if (layerIndex === k - 1) layerName += " (Lightest / Background)";
            else layerName += " (Midtone Paint)";

            const title = document.createElement('h3');
            title.innerText = layerName;
            
            const downloadLink = document.createElement('a');
            downloadLink.href = layerCanvas.toDataURL("image/png");
            downloadLink.download = `stencil_layer_${layerIndex + 1}.png`;
            downloadLink.innerText = "Download Layer";
            downloadLink.style.display = "block";
            downloadLink.style.marginTop = "10px";

            layerDiv.appendChild(title);
            layerDiv.appendChild(layerCanvas);
            layerDiv.appendChild(downloadLink);
            outputDiv.appendChild(layerDiv);
        });

        statusText.innerText = "Done! You can now download your layers.";
    }

    function kMeans(data, k, maxIterations = 20) {
        let centroids = [];
        for (let i = 0; i < k; i++) {
            centroids.push(data[Math.floor(Math.random() * data.length)]);
        }

        let assignments = new Int32Array(data.length);
        let sums = new Float32Array(k);
        let counts = new Int32Array(k);

        for (let iter = 0; iter < maxIterations; iter++) {
            sums.fill(0);
            counts.fill(0);
            
            for (let i = 0; i < data.length; i++) {
                let minDist = Infinity;
                let cluster = 0;
                for (let j = 0; j < k; j++) {
                    let dist = Math.abs(data[i] - centroids[j]);
                    if (dist < minDist) {
                        minDist = dist;
                        cluster = j;
                    }
                }
                assignments[i] = cluster;
                sums[cluster] += data[i];
                counts[cluster]++;
            }
            
            let changed = false;
            for (let j = 0; j < k; j++) {
                if (counts[j] > 0) {
                    let newCentroid = sums[j] / counts[j];
                    if (Math.abs(newCentroid - centroids[j]) > 0.5) changed = true;
                    centroids[j] = newCentroid;
                }
            }
            if (!changed) break;
        }
        
        return { centroids, assignments };
    }
</script>

</body>
</html>
