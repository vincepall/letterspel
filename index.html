<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stencil Maker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
        button, select, input[type="file"] {
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        .layer-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .layer {
            text-align: center;
            background: #fff;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 4px;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }
        #status {
            font-style: italic;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Multi-Layer Stencil Generator</h2>
    <p>Upload an image to generate separated black-and-white stencil layers.</p>

    <div class="controls">
        <input type="file" id="imageInput" accept="image/png, image/jpeg, image/webp">
        <select id="layerCount">
            <option value="3">3 Layers</option>
            <option value="4" selected>4 Layers</option>
        </select>
        <button id="processBtn" disabled>Generate Stencils</button>
    </div>

    <div id="status">Waiting for image...</div>
    <div class="layer-container" id="output"></div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const processBtn = document.getElementById('processBtn');
    const layerCountSelect = document.getElementById('layerCount');
    const statusText = document.getElementById('status');
    const outputDiv = document.getElementById('output');
    
    let sourceImage = new Image();

    // Enable button when image is loaded
    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            sourceImage.src = event.target.result;
            sourceImage.onload = () => {
                processBtn.disabled = false;
                statusText.innerText = "Image loaded. Ready to generate!";
            };
        };
        reader.readAsDataURL(file);
    });

    processBtn.addEventListener('click', function() {
        statusText.innerText = "Processing... (This might take a few seconds)";
        outputDiv.innerHTML = "";
        
        // Use a slight timeout to let the UI update before heavy processing blocks the thread
        setTimeout(() => generateStencils(), 50); 
    });

    function generateStencils() {
        const k = parseInt(layerCountSelect.value);
        
        // 1. Draw image to a hidden canvas and resize it for performance
        const maxDim = 800; // Max width/height to process
        let width = sourceImage.width;
        let height = sourceImage.height;
        
        if (width > maxDim || height > maxDim) {
            const ratio = Math.min(maxDim / width, maxDim / height);
            width = Math.floor(width * ratio);
            height = Math.floor(height * ratio);
        }

        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(sourceImage, 0, 0, width, height);

        // 2. Get pixel data and convert to grayscale
        const imgData = ctx.getImageData(0, 0, width, height);
        const data = imgData.data;
        let grayValues = new Float32Array(width * height);
        
        for (let i = 0; i < data.length; i += 4) {
            // Standard luminance calculation
            let gray = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
            grayValues[i/4] = gray;
        }

        // 3. Run K-Means Clustering on the grayscale values
        const { centroids, assignments } = kMeans(grayValues, k);

        // 4. Sort centroids from Darkest (lowest value) to Lightest (highest value)
        // Keep track of original indices to map assignments correctly
        let sortedCentroids = centroids.map((val, index) => ({val, index}))
                                       .sort((a, b) => a.val - b.val);

        // 5. Generate a canvas for each layer
        sortedCentroids.forEach((centroidObj, layerIndex) => {
            const layerCanvas = document.createElement('canvas');
            layerCanvas.width = width;
            layerCanvas.height = height;
            const layerCtx = layerCanvas.getContext('2d');
            const layerImgData = layerCtx.createImageData(width, height);
            const lData = layerImgData.data;

            // Paint the mask: Black if it belongs to this centroid, White otherwise
            for (let i = 0; i < grayValues.length; i++) {
                const pixelIndex = i * 4;
                if (assignments[i] === centroidObj.index) {
                    lData[pixelIndex] = 0;     // R
                    lData[pixelIndex+1] = 0;   // G
                    lData[pixelIndex+2] = 0;   // B
                    lData[pixelIndex+3] = 255; // Alpha
                } else {
                    lData[pixelIndex] = 255;
                    lData[pixelIndex+1] = 255;
                    lData[pixelIndex+2] = 255;
                    lData[pixelIndex+3] = 255;
                }
            }

            layerCtx.putImageData(layerImgData, 0, 0);

            // Create DOM elements to display
            const layerDiv = document.createElement('div');
            layerDiv.className = 'layer';
            
            const title = document.createElement('h3');
            title.innerText = `Layer ${layerIndex + 1} (${layerIndex === 0 ? 'Darkest' : layerIndex === k-1 ? 'Lightest' : 'Midtone'})`;
            
            const downloadLink = document.createElement('a');
            downloadLink.href = layerCanvas.toDataURL("image/png");
            downloadLink.download = `stencil_layer_${layerIndex + 1}.png`;
            downloadLink.innerText = "Download Layer";
            downloadLink.style.display = "block";
            downloadLink.style.marginTop = "10px";

            layerDiv.appendChild(title);
            layerDiv.appendChild(layerCanvas);
            layerDiv.appendChild(downloadLink);
            outputDiv.appendChild(layerDiv);
        });

        statusText.innerText = "Done! You can now download your layers.";
    }

    // Basic 1D K-Means implementation
    function kMeans(data, k, maxIterations = 20) {
        let centroids = [];
        // Randomly initialize centroids from existing data points
        for (let i = 0; i < k; i++) {
            centroids.push(data[Math.floor(Math.random() * data.length)]);
        }

        let assignments = new Int32Array(data.length);
        let sums = new Float32Array(k);
        let counts = new Int32Array(k);

        for (let iter = 0; iter < maxIterations; iter++) {
            sums.fill(0);
            counts.fill(0);
            
            // Assign each pixel to nearest centroid
            for (let i = 0; i < data.length; i++) {
                let minDist = Infinity;
                let cluster = 0;
                for (let j = 0; j < k; j++) {
                    let dist = Math.abs(data[i] - centroids[j]);
                    if (dist < minDist) {
                        minDist = dist;
                        cluster = j;
                    }
                }
                assignments[i] = cluster;
                sums[cluster] += data[i];
                counts[cluster]++;
            }
            
            // Recalculate centroids
            let changed = false;
            for (let j = 0; j < k; j++) {
                if (counts[j] > 0) {
                    let newCentroid = sums[j] / counts[j];
                    if (Math.abs(newCentroid - centroids[j]) > 0.5) changed = true;
                    centroids[j] = newCentroid;
                }
            }
            if (!changed) break;
        }
        
        return { centroids, assignments };
    }
</script>

</body>
</html>
